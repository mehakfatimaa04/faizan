<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unlock</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg,#b56cff,#ff8fd8);
        overflow:hidden;
    }

    /* Hearts */
    .heart{
        position:absolute;
        color:white;
        font-size:20px;
        opacity:0.5;
        animation: float 6s infinite ease-in-out;
    }

    @keyframes float{
        0%{transform:translateY(0);}
        50%{transform:translateY(-20px);}
        100%{transform:translateY(0);}
    }

    .container{
        width:350px;
        background:rgba(255,255,255,0.15);
        backdrop-filter: blur(12px);
        padding:30px;
        border-radius:25px;
        text-align:center;
        color:white;
        box-shadow:0 0 25px rgba(255,255,255,0.2);
    }

    .title{
        font-size:30px;
        font-family:cursive;
        margin-bottom:20px;
    }

    .question{
        margin-bottom:20px;
        font-size:18px;
    }

    #display{
        width:100%;
        height:50px;
        border:none;
        border-radius:12px;
        margin-bottom:20px;
        text-align:center;
        font-size:24px;
        background:rgba(255,255,255,0.3);
        color:white;
    }

    .keypad{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:10px;
    }

    button{
        padding:18px;
        font-size:20px;
        border:none;
        border-radius:15px;
        cursor:pointer;
        background:rgba(255,255,255,0.25);
        color:white;
        transition:0.2s;
    }

    button:hover{
        background:rgba(255,255,255,0.4);
    }

    .message{
        margin-top:15px;
        font-size:18px;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="heart" style="top:10%;left:10%">💖</div>
<div class="heart" style="top:20%;right:15%">✨</div>
<div class="heart" style="bottom:20%;left:15%">💗</div>
<div class="heart" style="bottom:10%;right:10%">✨</div>

<div class="container">
    <div class="title">Heyy my love Faizan</div>
    <div class="question">When was the first time we started talking?</div>

    <input id="display" readonly>

    <div class="keypad">
        <button onclick="addNum('1')">1</button>
        <button onclick="addNum('2')">2</button>
        <button onclick="addNum('3')">3</button>
        <button onclick="addNum('4')">4</button>
        <button onclick="addNum('5')">5</button>
        <button onclick="addNum('6')">6</button>
        <button onclick="addNum('7')">7</button>
        <button onclick="addNum('8')">8</button>
        <button onclick="addNum('9')">9</button>
        <button onclick="clearInput()">⌫</button>
        <button onclick="addNum('0')">0</button>
        <button onclick="checkPassword()">🔓</button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
let input = "";
const correctPassword = "21042026";

function addNum(num){
    if(input.length < 8){
        input += num;
        document.getElementById("display").value = "*".repeat(input.length);
    }
}

function clearInput(){
    input = input.slice(0,-1);
    document.getElementById("display").value = "*".repeat(input.length);
}

function checkPassword(){
    if(input === correctPassword){
        window.location.href = "page2.html";
    }else{
        document.getElementById("message").innerText = "Try again 💔";
        input = "";
        document.getElementById("display").value = "";
    }
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter For Faizan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(135deg,#7b2ff7,#d76dff,#f8a5ff);
    font-family: Georgia, serif;
}

/* Sparkles */
.sparkle{
    position:absolute;
    color:white;
    animation: sparkle 3s infinite ease-in-out;
    opacity:0.8;
}

@keyframes sparkle{
    0%,100%{transform:scale(1); opacity:0.3;}
    50%{transform:scale(1.5); opacity:1;}
}

/* Hearts */
.heart{
    position:absolute;
    font-size:24px;
    animation: float 5s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

/* Flower animation */
.flower{
    position:absolute;
    font-size:60px;
    animation:bloom 4s infinite alternate;
}

@keyframes bloom{
    from{transform:scale(0.8) rotate(0deg);}
    to{transform:scale(1.1) rotate(8deg);}
}

/* Letter */
.letter{
    width:70%;
    max-width:850px;
    background:#f8ecd8;
    border:8px solid #c59b6d;
    border-radius:18px;
    padding:40px;
    box-shadow:0 0 40px rgba(0,0,0,0.3);
    position:relative;
    overflow-y:auto;
    max-height:85vh;
}

.letter::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(255,248,220,0.3);
    pointer-events:none;
}

h1{
    text-align:center;
    font-size:40px;
    margin-bottom:25px;
    color:#6b3a2f;
    font-family:cursive;
}

p{
    font-size:22px;
    line-height:1.8;
    color:#4b2d22;
}
</style>
</head>
<body>

<div class="sparkle" style="top:10%;left:15%">✨</div>
<div class="sparkle" style="top:20%;right:10%">✨</div>
<div class="sparkle" style="bottom:15%;left:10%">✨</div>

<div class="heart" style="top:8%;right:25%">💜</div>
<div class="heart" style="bottom:10%;right:18%">💖</div>

<div class="flower" style="bottom:20px;left:20px;">🌸</div>
<div class="flower" style="top:20px;right:20px;">🌺</div>
<div class="flower" style="bottom:20px;right:40px;">🌷</div>
<div class="flower" style="top:40px;left:40px;">🪷</div>

<div class="letter">
    <h1>For Faizan 💌</h1>

    <p>
        PASTE YOUR LETTER HERE
    </p>
</div>

</body>
</html>
