<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flowers For You ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
radial-gradient(circle at top,#ff6b9d,#d40055,#5b001d);

}

/* Background hearts */

.heart{
position:absolute;
color:#ffb6c1;
animation:float 12s linear infinite;
opacity:.4;
font-size:20px;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}

}

/* Card */

.card{

width:900px;
height:560px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:35px;

box-shadow:
0 0 60px rgba(255,0,80,.35);

display:flex;
justify-content:space-around;
align-items:center;

padding:40px;

animation:fade 1.3s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:none;
}

}

/* Left text */

.text{

width:42%;
color:white;

}

h1{

font-size:50px;
margin-bottom:20px;
color:#ffdce7;

}

p{

font-size:18px;
line-height:1.8;

}

/* Bouquet */

.bouquet{

position:relative;
width:340px;
height:420px;

animation:move 4s ease-in-out infinite;

}

@keyframes move{

50%{
transform:translateY(-12px);
}

}

/* Stem */

.stem{

position:absolute;
bottom:40px;
left:50%;
width:12px;
height:220px;

background:linear-gradient(#2ea043,#195d24);

transform:translateX(-50%);

}

/* Leaves */

.leaf{

position:absolute;
width:70px;
height:30px;
background:#2cb64e;

border-radius:100px 0;

}

.leaf1{

bottom:160px;
left:135px;
transform:rotate(-35deg);

}

.leaf2{

bottom:120px;
left:170px;
transform:rotate(145deg);

}

/* Wrapper */

.wrapper{

position:absolute;
bottom:0;
left:50%;

transform:translateX(-50%);

width:180px;
height:170px;

background:linear-gradient(135deg,#ffd7e4,#ffffff);

clip-path:polygon(50% 100%,0 10%,100% 10%);

box-shadow:0 10px 20px rgba(0,0,0,.2);

}

/* Ribbon */

.ribbon{

position:absolute;

bottom:70px;

left:50%;

transform:translateX(-50%);

font-size:50px;

}

/* Flowers */

.flower{

position:absolute;
font-size:70px;
filter:drop-shadow(0 0 10px rgba(255,255,255,.4));

animation:sway 5s ease-in-out infinite;

}

@keyframes sway{

50%{
transform:rotate(5deg) translateY(-5px);
}

}

.f1{top:10px;left:125px;}
.f2{top:60px;left:40px;}
.f3{top:60px;right:40px;}
.f4{top:120px;left:95px;}
.f5{top:120px;right:95px;}
.f6{top:0px;left:205px;}
.f7{top:0px;left:50px;}

/* Sparkles */

.sparkle{

position:absolute;
font-size:18px;
color:white;
animation:blink 2s infinite;

}

@keyframes blink{

50%{
opacity:.2;
transform:scale(.6);
}

}

.s1{top:30px;left:15px;}
.s2{top:90px;right:10px;}
.s3{top:10px;right:80px;}
.s4{top:180px;left:40px;}

button{

margin-top:35px;

padding:15px 35px;

border:none;

border-radius:40px;

font-size:18px;

cursor:pointer;

background:#ff3d7f;

color:white;

box-shadow:0 0 20px hotpink;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<script>

for(let i=0;i<35;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(8+Math.random()*8)+"s";

h.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(h);

}

</script>

<div class="card">

<div class="text">

<h1>🌹 Flowers For You,<br>My Love ❤️</h1>

<p>

Every rose carries my admiration.

Every lily carries my respect.

Every flower blooms with the hope that your smile never fades.

This bouquet isn't just flowers...

it's every heartbeat I couldn't put into words.

Forever yours,

<b>— Mehak ❤️</b>

</p>

<button onclick="alert('Every flower here carries a piece of my heart. ❤️')">
Accept My Flowers 🌹
</button>

</div>

<div class="bouquet">

<div class="flower f1">🌹</div>
<div class="flower f2">🌹</div>
<div class="flower f3">🌹</div>

<div class="flower f4">🤍</div>
<div class="flower f5">🤍</div>

<div class="flower f6">🌹</div>
<div class="flower f7">🤍</div>

<div class="stem"></div>

<div class="leaf leaf1"></div>
<div class="leaf leaf2"></div>

<div class="wrapper"></div>

<div class="ribbon">🎀</div>

<div class="sparkle s1">✨</div>
<div class="sparkle s2">✨</div>
<div class="sparkle s3">✨</div>
<div class="sparkle s4">✨</div>

</div>

</div>

</body>
</html>
