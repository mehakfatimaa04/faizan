<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Memories</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#7b2ff7,#d76dff,#f8a5ff);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:cursive;
}

/* Hearts */
.heart{
    position:absolute;
    font-size:25px;
    animation: float 5s infinite ease-in-out;
}

@keyframes float{
    50%{transform:translateY(-20px);}
}

/* Sparkles */
.sparkle{
    position:absolute;
    animation: sparkle 3s infinite;
}

@keyframes sparkle{
    50%{transform:scale(1.4);}
}

h1{
    color:white;
    font-size:42px;
    margin-bottom:40px;
}

.gallery{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
}

.polaroid{
    width:220px;
    background:white;
    padding:15px 15px 50px 15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
    transform:rotate(-4deg);
    transition:0.3s;
}

.polaroid:nth-child(even){
    transform:rotate(4deg);
}

.polaroid:hover{
    transform:scale(1.05);
}

.polaroid img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.caption{
    text-align:center;
    margin-top:12px;
    font-size:22px;
}
</style>
</head>
<body>

<div class="heart" style="top:10%;left:10%">💖</div>
<div class="heart" style="top:20%;right:10%">💜</div>
<div class="sparkle" style="bottom:10%;left:15%">✨</div>
<div class="sparkle" style="top:15%;right:20%">✨</div>

<h1>Our Memories 📸</h1>

<div class="gallery">

    <div class="polaroid">
        <img src="IMG_3126.JPG">
        <div class="caption">forever 💜</div>
    </div>

    <div class="polaroid">
        <img src="img1.jpeg">
        <div class="caption">My love</div>
    </div>

    <div class="polaroid">
        <img src="img2.jpeg">
        <div class="caption">US</div>
    </div>

</div>

</body>
</html>
